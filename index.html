    <meta charset="UTF-8" />

    <!-- ============================================================
         FAVICONS
    ============================================================ -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <!-- ============================================================
         VIEWPORT & CRAWLING
    ============================================================ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />

    <!-- ============================================================
         GEO TARGETING — señales explícitas para Argentina
    ============================================================ -->
    <meta name="geo.region" content="AR" />
    <meta name="geo.placename" content="Argentina" />
    <meta name="language" content="es-AR" />

    <!-- ============================================================
         TITLE & PRIMARY META
         Tip: incluí la keyword principal cerca del inicio del título.
         Longitud ideal: 50–60 caracteres.
    ============================================================ -->
    <title>QRapido — Creador de Códigos QR Dinámicos con Analytics</title>

    <meta
      name="description"
      content="Creá códigos QR dinámicos desde Argentina. Editá el destino cuando quieras, personalizá el diseño y medí cada escaneo con analytics en tiempo real. Probalo gratis 7 días."
    />

    <!-- Keywords: aunque Google las ignora, Bing y otros buscadores aún las usan -->
    <meta
      name="keywords"
      content="crear código QR, QR dinámico, generador QR Argentina, QR con estadísticas, QR editable, QR para negocios, QRapido"
    />

    <meta name="author" content="QRapido" />
    <link rel="canonical" href="https://qrapido.io/" />

    <!-- ============================================================
         HREFLANG — le dice a Google que este sitio es para es-AR
    ============================================================ -->
    <link rel="alternate" hreflang="es-AR" href="https://qrapido.io/" />
    <link rel="alternate" hreflang="x-default" href="https://qrapido.io/" />

    <!-- ============================================================
         OPEN GRAPH
    ============================================================ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="QRapido" />
    <meta property="og:locale" content="es_AR" />
    <meta property="og:title" content="QRapido — Creador de Códigos QR Dinámicos con Analytics" />
    <meta
      property="og:description"
      content="Creá códigos QR dinámicos desde Argentina. Editá el destino cuando quieras y medí cada escaneo con analytics detallados. Probalo gratis 7 días."
    />
    <meta property="og:image" content="https://qrapido.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="QRapido — Generador de QR dinámicos para Argentina" />
    <meta property="og:url" content="https://qrapido.io/" />

    <!-- ============================================================
         TWITTER / X
    ============================================================ -->
    <meta name="twitter:card" content="summary_large_image" />
    
    <meta name="twitter:title" content="QRapido — Creador de Códigos QR Dinámicos con Analytics" />
    <meta
      name="twitter:description"
      content="Creá códigos QR dinámicos desde Argentina. Editá el destino cuando quieras y medí cada escaneo. Probalo gratis 7 días."
    />
    <meta name="twitter:image" content="https://qrapido.io/og-image.png" />

    <!-- ============================================================
         SCHEMA.ORG — JSON-LD
         SoftwareApplication + WebSite markup.
         Habilita rich results en Google y refuerza la señal de localización.
    ============================================================ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "QRapido",
          "url": "https://qrapido.io",
          "description": "Plataforma argentina para crear, editar y analizar códigos QR dinámicos. Personalizá el diseño, cambiá el destino sin reimprimir y medí cada escaneo con analytics detallados.",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "inLanguage": "es-AR",
          "offers": {
            "@type": "Offer",
            "name": "Plan Pro",
            "price": "8500",
            "priceCurrency": "ARS",
            "priceSpecification": {
              "@type": "UnitPriceSpecification",
              "billingDuration": "P1M"
            }
          },
          "areaServed": {
            "@type": "Country",
            "name": "Argentina"
          },
          "featureList": [
            "Códigos QR dinámicos editables",
            "Analytics de escaneos en tiempo real",
            "Personalización de colores y diseño",
            "Descarga en JPG, PNG y SVG",
            "Panel de administración multi-QR",
            "Historial de escaneos"
          ]
        },
        {
          "@type": "WebSite",
          "url": "https://qrapido.io",
          "name": "QRapido",
          "description": "Creador de códigos QR dinámicos para Argentina",
          "inLanguage": "es-AR",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://qrapido.io/search?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
